<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN FORM</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .card {
            max-width: 400px;
            margin: auto;
            border-radius: 15px;
        }

        #result {
            font-size: 18px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Login Form</h1>

   
    <button class="btn btn-info mb-3" onclick="toggleInstructions()">Show Instructions</button>

    <div id="instructions" class="alert alert-secondary d-none">
        <p><strong>Username:</strong> Emerald</p>
        <p><strong>Password:</strong> 12345</p>
        <p>You only have 3 attempts.</p>
    </div>

   
    <div class="card p-4 shadow">
        <h2 class="mb-3">Login</h2>

        <div class="mb-3">
            <label>Username</label>
            <input type="text" id="username" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control">
        </div>

        <button class="btn btn-primary w-100" onclick="login()">Login</button>

        <p id="result" class="mt-3 text-center fw-bold"></p>
    </div>

</div>

<script>
    
    var correctUser = "Emerald";
    var correctPass = "12345";

    var attempt = 0;
    var maxTry = 3;

    
    function toggleInstructions() {
        var box = document.getElementById("instructions");
        box.classList.toggle("d-none");
    }

    
    function login() {

        var username = document.getElementById("username").value;
        var password = document.getElementById("password").value;
        var result = document.getElementById("result");

        if (attempt >= maxTry) {
            result.innerHTML = "❌ Account Locked!";
            result.style.color = "red";
            return;
        }

        if (username === correctUser && password === correctPass) {
            result.innerHTML = " Login Successful!";
            result.style.color = "green";
        } else {
            attempt++;
            result.innerHTML = " Login Failed! Attempts left: " + (maxTry - attempt);
            result.style.color = "red";
        }
    }
</script>

</body>
</html>
